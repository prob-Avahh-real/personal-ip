<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Avah：审美驱动的数字时代女性。作品集、灵感取材、制作过程与作品介绍，持续更新。"
    />
    <title>Avah — IT Girl 个人品牌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#about">跳到内容</a>

    <header class="site-header" data-header>
      <a class="logo" href="#top" aria-label="Avah 首页">
        <span class="logo-mark" aria-hidden="true"></span>
        <span class="logo-text" data-brand>Avah</span>
      </a>
      <nav class="site-nav" data-nav aria-label="主导航"></nav>
      <button
        class="nav-toggle"
        type="button"
        data-nav-toggle
        aria-expanded="false"
        aria-controls="mobile-nav"
      >
        <span class="sr-only">菜单</span>
        <span></span><span></span>
      </button>
    </header>

    <div class="mobile-nav" id="mobile-nav" data-mobile-nav hidden></div>

    <main id="top">
      <section class="hero" aria-labelledby="brand">
        <div class="hero-visual" aria-hidden="true">
          <div class="hero-grain"></div>
          <div class="hero-glow"></div>
          <div class="hero-sheen"></div>
          <svg class="hero-device" viewBox="0 0 720 900" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="panelGrad" x1="160" y1="80" x2="560" y2="820" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1c3026" />
                <stop offset="0.45" stop-color="#11241c" />
                <stop offset="1" stop-color="#214038" />
              </linearGradient>
              <linearGradient id="lacquerLine" x1="180" y1="160" x2="540" y2="700" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6e2c34" stop-opacity="0.15" />
                <stop offset="0.45" stop-color="#d6a8ab" stop-opacity="0.88" />
                <stop offset="1" stop-color="#9e444e" stop-opacity="0.2" />
              </linearGradient>
              <linearGradient id="frameEdge" x1="200" y1="60" x2="520" y2="860" gradientUnits="userSpaceOnUse">
                <stop stop-color="#345445" />
                <stop offset="0.5" stop-color="#a0787c" />
                <stop offset="1" stop-color="#254034" />
              </linearGradient>
            </defs>
            <!-- Editorial frame — fashion/tech silhouette, full-bleed -->
            <rect x="168" y="56" width="384" height="788" rx="8" fill="#0a1712" stroke="url(#frameEdge)" stroke-width="1.5" />
            <rect x="188" y="92" width="344" height="680" rx="2" fill="url(#panelGrad)" />
            <!-- lacquer arcs — muted rose on forest panel -->
            <path class="trail trail-a" d="M230 200 C300 140, 420 160, 490 240" stroke="url(#lacquerLine)" stroke-width="1.75" stroke-linecap="round" />
            <path class="trail trail-b" d="M220 380 C290 320, 430 360, 500 440" stroke="url(#lacquerLine)" stroke-width="1.5" stroke-linecap="round" />
            <path class="trail trail-c" d="M240 560 C310 500, 420 540, 490 620" stroke="url(#lacquerLine)" stroke-width="1.25" stroke-linecap="round" />
            <line x1="220" y1="720" x2="500" y2="720" stroke="#254034" stroke-width="1" />
            <circle class="pulse-dot" cx="360" cy="340" r="4" fill="#c05a64" />
            <circle class="pulse-ring" cx="360" cy="340" r="26" stroke="#c05a64" stroke-opacity="0.4" stroke-width="1" fill="none" />
          </svg>
        </div>

        <div class="hero-copy">
          <p class="brand" id="brand" data-brand-hero data-reveal>Avah</p>
          <p class="brand-zh" data-brand-sub data-reveal data-delay="1"></p>
          <h1 class="headline" data-headline data-reveal data-delay="2"></h1>
          <p class="support" data-support data-reveal data-delay="3"></p>
          <div class="cta-group" data-ctas data-reveal data-delay="4"></div>
        </div>
      </section>

      <section class="section about" id="about" aria-labelledby="about-title">
        <div class="section-inner">
          <p class="eyebrow" data-about-eyebrow></p>
          <h2 id="about-title" data-about-title></h2>
          <div class="about-body" data-about-body></div>
        </div>
      </section>

      <section class="section works" id="works" aria-labelledby="works-title">
        <div class="section-inner">
          <p class="eyebrow" data-works-eyebrow></p>
          <h2 id="works-title" data-works-title></h2>
          <p class="works-intro" data-works-intro></p>
          <div class="works-body" data-works-body></div>
        </div>
      </section>

      <section class="section pillars" id="pillars" aria-labelledby="pillars-title">
        <div class="section-inner">
          <p class="eyebrow" data-pillars-eyebrow></p>
          <h2 id="pillars-title" data-pillars-title></h2>
          <ol class="pillars-list" data-pillars-list></ol>
        </div>
      </section>

      <section class="section contact" id="contact" aria-labelledby="contact-title">
        <div class="section-inner">
          <p class="eyebrow" data-contact-eyebrow></p>
          <h2 id="contact-title" data-contact-title></h2>
          <p class="contact-body" data-contact-body></p>
          <div class="contact-actions" data-contact-actions></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="footer-brand" data-brand-footer>Avah</p>
      <p class="footer-note" data-footer-note></p>
      <p class="footer-year" data-footer-year></p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
